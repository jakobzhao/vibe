[[mgr.prepend_keymap]]
on = [ "f" ]
run = "plugin vibe-favorites toggle"
desc = "Show/hide Favorites"

[[mgr.prepend_keymap]]
on = "<Enter>"
run = "plugin vibe-open"
desc = "Enter directory or open file in Main"

[[mgr.prepend_keymap]]
on = [ "b", "a" ]
run = "plugin vibe-favorites add"
desc = "Add hovered item to Favorites"

[[mgr.prepend_keymap]]
on = [ "b", "d" ]
run = "plugin vibe-favorites remove"
desc = "Remove hovered item from Favorites"

[[mgr.prepend_keymap]]
on = [ "c", "a" ]
run = "plugin vibe-context add"
desc = "Add selected files to Agent Context"

[[mgr.prepend_keymap]]
on = [ "c", "s" ]
run = "plugin vibe-context send"
desc = "Stage Context in the active Agent"

[[mgr.prepend_keymap]]
on = [ "c", "c" ]
run = "plugin vibe-context clear"
desc = "Clear Agent Context"
