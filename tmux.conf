set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

unbind C-b
set -g prefix C-a
bind C-a send-prefix

set -g mouse on
set -g history-limit 50000
set -g escape-time 10
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g focus-events on
set -g allow-rename off

bind r source-file ~/.tmux.conf \; display-message "tmux config reloaded"
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"
bind Q confirm-before -p "Quit vibe and stop this session? (y/n)" kill-session

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

bind -r H resize-pane -L 5
bind -r J resize-pane -D 3
bind -r K resize-pane -U 3
bind -r L resize-pane -R 5

setw -g mode-keys vi
bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi y send -X copy-selection-and-cancel

set -g pane-border-style "fg=#343851"
set -g pane-active-border-style "fg=#21b568"
set -g pane-border-status top
set -g pane-border-format "#[align=left]#[fg=#343851] ─ #{?#{@vibe_tabs},#{?#{==:#{@vibe_tab_kind},shell},#[fg=#21b568]#[bold],#[fg=#8d91a5]#[nobold]}Shell #[fg=#343851]│ #{?#{==:#{@vibe_tab_kind},directory},#[fg=#21b568]#[bold],#[fg=#8d91a5]#[nobold]}Directory,#{?pane_active,#[fg=#21b568]#[bold],#[fg=#8d91a5]#[nobold]}#{?#{@vibe_role},#{@vibe_role},#{pane_title}}} #[fg=#343851]─ "

# Shell and Directory share one visible pane slot. Their border labels switch
# the preserved panes; all other borders keep normal click-to-focus behavior.
bind-key -n MouseDown1Border if-shell -F -t = '#{@vibe_tabs}' \
  'run-shell -t = "\"#{@vibe_tab_helper}\" mouse \"#{session_name}\" \"#{mouse_x}\" \"#{pane_left}\" \"#{pane_id}\""' \
  'select-pane -t ='
set -g display-panes-active-colour "#21b568"
set -g display-panes-colour "#8d91a5"
set -g message-style "fg=#e2e3e8,bg=#343851"
set -g mode-style "fg=#141729,bg=#21b568"

# Pane borders already carry the workspace's navigation context. Keep the
# bottom row clear so the cockpit remains focused and visually quiet.
set -g status off

# Persist layouts and working directories across tmux/server restarts.
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'on'

# Keep TPM last so all plugins see the final status-line configuration.
run '~/.tmux/plugins/tpm/tpm'

# TPM sets the default restore path while loading resurrect, so override it last.
# This avoids a first-launch warning when no snapshot exists yet.
set -g @resurrect-restore-script-path 'vibe-restore'
