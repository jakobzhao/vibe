set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

unbind C-b
set -g prefix C-a
bind C-a send-prefix

set -g mouse on
set -g history-limit 50000
set -g escape-time 10
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g focus-events on
set -g allow-rename off
set-hook -g pane-focus-in 'if-shell -F "#{@vibe_is_agent}" "set-option @vibe_active_agent #{pane_id}"'

bind r source-file ~/.tmux.conf \; display-message "tmux config reloaded"
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"
bind Q confirm-before -p "Quit vibe and stop this session? (y/n)" kill-session
bind e run-shell "#{@vibe_directory_command}"
bind s run-shell "#{@vibe_shell_command} #{client_name}"
bind g run-shell "#{@vibe_review_command}"
bind t run-shell "#{@vibe_test_command} #{client_name}"

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

bind -r H resize-pane -L 5
bind -r J resize-pane -D 3
bind -r K resize-pane -U 3
bind -r L resize-pane -R 5

setw -g mode-keys vi
bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi y send -X copy-selection-and-cancel

set -g pane-border-style "fg=#343851"
set -g pane-active-border-style "fg=#21b568"
set -g pane-border-status top
set -g pane-border-format "#[fg=#343851] ─ #{?pane_active,#[fg=#21b568]#[bold],#[fg=#8d91a5]#[nobold]}#{?#{@vibe_role},#{@vibe_role},#{pane_title}} #[fg=#343851]─ "

# In Vibe, clicking the Directory/Favorites pane border toggles its view.
# Other panes keep the normal click-to-focus behavior.
bind-key -n MouseDown1Border if-shell -F -t = '#{@vibe_favorites_click}' \
  'send-keys -t = f' \
  'select-pane -t ='
set -g display-panes-active-colour "#21b568"
set -g display-panes-colour "#8d91a5"
set -g message-style "fg=#e2e3e8,bg=#343851"
set -g mode-style "fg=#141729,bg=#21b568"

set -g status on
set -g status-interval 5
set -g status-position bottom
set -g status-style "fg=#e2e3e8,bg=#141729"
set -g status-left-length 40
set -g status-right-length 80
set -g status-left "#[fg=#141729,bg=#21b568,bold] #S #[fg=#e2e3e8,bg=#343851] #{?#{@vibe_role},#{@vibe_role},#{pane_title}} "
set -g status-right "#[fg=#eca855]ctx:#{?#{@vibe_context_count},#{@vibe_context_count},0} #[fg=#3ed7be]#(git -C \"#{@vibe_dir}\" branch --show-current 2>/dev/null) #[fg=#8d91a5]#{?#{==:#{@vibe_dir},},#{b:pane_current_path},#{@vibe_dir}} #[fg=#21b568]%H:%M "
setw -g window-status-format "#[fg=#8d91a5,bg=#141729] #I:#W "
setw -g window-status-current-format "#[fg=#141729,bg=#21b568,bold] #I:#W "

# Persist layouts and working directories across tmux/server restarts.
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'on'

# Keep TPM last so all plugins see the final status-line configuration.
run '~/.tmux/plugins/tpm/tpm'

# TPM sets the default restore path while loading resurrect, so override it last.
# This avoids a first-launch warning when no snapshot exists yet.
set -g @resurrect-restore-script-path 'vibe-restore'
