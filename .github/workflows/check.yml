name: check

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  shell:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - name: Install Neovim
        run: |
          if ! command -v nvim >/dev/null 2>&1; then
            if command -v brew >/dev/null 2>&1; then
              brew install neovim
            else
              sudo apt-get update
              sudo apt-get install -y neovim
            fi
          fi
      - name: Check scripts
        run: ./tests/check.sh
